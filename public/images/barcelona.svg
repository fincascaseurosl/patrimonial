<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
<defs>
<pattern id="bcn-grid" width="14" height="14" patternUnits="userSpaceOnUse">
<path d="M 14 0 L 0 0 0 14" fill="none" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>
</pattern>
</defs>

<!-- Barcelona shape: coast at SE diagonal, Collserola hills at N, Llobregat at SW, Besòs at NE -->
<path d="M 175 165
  C 230 130, 310 110, 400 110
  C 470 105, 540 110, 605 120
  C 690 130, 770 145, 850 165
  C 935 188, 1010 215, 1075 250
  L 1090 275
  C 1095 300, 1080 320, 1050 345
  C 990 395, 920 440, 850 485
  C 760 545, 660 605, 555 660
  C 470 700, 380 730, 305 740
  C 250 745, 215 735, 195 715
  L 178 690
  C 165 650, 152 590, 142 510
  C 132 425, 130 340, 138 260
  C 144 220, 156 188, 175 165 Z"
  fill="#F5F2EC" stroke="#9A968D" stroke-width="1.5" stroke-linejoin="round"/>

<!-- Eixample grid hint (central area) -->
<rect x="380" y="295" width="380" height="240" fill="url(#bcn-grid)" />

<!-- Diagonal avenue line (NE-SW) -->
<line x1="320" y1="640" x2="1000" y2="290" stroke="#9A968D" stroke-width="0.8" stroke-dasharray="4 6" opacity="0.5"/>

<!-- Coast accent line -->
<path d="M 1090 275 C 990 395, 850 485, 555 660 C 380 730, 305 740"
  fill="none" stroke="#9A968D" stroke-width="0.8" opacity="0.55"/>

<!-- Tiny labels for orientation -->
<text x="200" y="155" fill="#9A968D" font-size="9" font-weight="500" letter-spacing="2" font-family="ui-sans-serif, system-ui">COLLSEROLA</text>
<text x="940" y="510" fill="#9A968D" font-size="9" font-weight="500" letter-spacing="2" font-family="ui-sans-serif, system-ui">MAR MEDITERRÀNIA</text>

</svg>
